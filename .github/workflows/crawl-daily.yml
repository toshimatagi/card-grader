name: crawl-daily

on:
  schedule:
    # 毎日 JST 04:00 ≒ UTC 19:00 : 全セット
    - cron: "0 19 * * *"
  workflow_dispatch:

concurrency:
  group: crawl-daily
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: cardrush
            brand: onepiece
          - source: tierone
            brand: onepiece
          - source: fullahead
            brand: onepiece
          - source: toretoku
            brand: onepiece
          - source: raftel
            brand: onepiece
          # Pokemon: cleanup が migration 007 (crawl_runs.brand) 適用後は (source, brand) 単位で
          # cutoff を計算するので、同 source の複数 brand 干渉は解消されている
          - source: fullahead
            brand: pokemon
          # toretoku/pokemon は 1リクエストで全件 (~158件 of M/SV系) 取れる。
          # 買取価格 (price_type=buy) ソース。fullahead と組み合わせて source>=2 を実現
          - source: toretoku
            brand: pokemon
          # fullcomp/pokemon は Shopify ベースで価格変動する販売価格データ。
          # 31セット 1075カード。fullahead (固定気味) と並列で sell source>=2 達成、
          # trending_cards (sell) が pokemon でも機能するようになる
          - source: fullcomp
            brand: pokemon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run crawler (${{ matrix.source }} / ${{ matrix.brand }}, all sets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -m backend.crawlers.run \
            --source ${{ matrix.source }} \
            --brand ${{ matrix.brand }} \
            --scope all

  cleanup:
    runs-on: ubuntu-latest
    needs: crawl
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Cleanup stale snapshots (per-source scope=all cutoff)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m backend.crawlers.cleanup --execute
