name: crawl-daily

on:
  schedule:
    # 毎日 JST 04:00 ≒ UTC 19:00 : 全セット
    - cron: "0 19 * * *"
  workflow_dispatch:

concurrency:
  group: crawl-daily
  cancel-in-progress: false

jobs:
  yuyutei-all:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run crawlers (all sources, all sets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -m backend.crawlers.run --source cardrush --brand onepiece --scope all || true
          python -m backend.crawlers.run --source tierone  --brand onepiece --scope all || true
