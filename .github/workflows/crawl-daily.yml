name: crawl-daily

on:
  schedule:
    # 毎日 JST 04:00 ≒ UTC 19:00 : 全セット
    - cron: "0 19 * * *"
  workflow_dispatch:

concurrency:
  group: crawl-daily
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        source: [cardrush, tierone, fullahead, toretoku, raftel]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run crawler (${{ matrix.source }}, all sets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -m backend.crawlers.run \
            --source ${{ matrix.source }} \
            --brand onepiece \
            --scope all

  cleanup:
    runs-on: ubuntu-latest
    needs: crawl
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Cleanup stale snapshots (per-source scope=all cutoff)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m backend.crawlers.cleanup --execute
