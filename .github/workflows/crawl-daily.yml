name: crawl-daily

on:
  schedule:
    # 毎日 JST 04:00 ≒ UTC 19:00 : 全セット
    - cron: "0 19 * * *"
  workflow_dispatch:

concurrency:
  group: crawl-daily
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: cardrush
            brand: onepiece
          - source: tierone
            brand: onepiece
          - source: fullahead
            brand: onepiece
          - source: toretoku
            brand: onepiece
          - source: raftel
            brand: onepiece
          # Pokemon (fullahead) は cleanup.py が source 単位で cutoff を取る制約のため
          # daily からは外す。同 source に複数 brand があると、後発 brand の started_at が
          # 先発 brand の cutoff を上書きして全スナップショット誤削除を誘発する。
          # cleanup.py を (source, brand) 単位にしてから daily に戻す予定。
          # 現状 hourly cron (scope=hot) のみで運用
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run crawler (${{ matrix.source }} / ${{ matrix.brand }}, all sets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -m backend.crawlers.run \
            --source ${{ matrix.source }} \
            --brand ${{ matrix.brand }} \
            --scope all

  cleanup:
    runs-on: ubuntu-latest
    needs: crawl
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Cleanup stale snapshots (per-source scope=all cutoff)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m backend.crawlers.cleanup --execute
