name: cron-cardrush-pokemon

# cardrush-pokemon は Cloudflare 経由で GH Actions IP から取得が不安定なため、
# Render API 経由で叩く。Render IP は 200 で取得可能 (判定済)。
# cardrush.py は既に brand 両対応済 (onepiece/pokemon)。

on:
  schedule:
    # 毎日 JST 06:00 ≒ UTC 21:00 (yuyutei cron 30分後にずらして同居)
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: cron-cardrush-pokemon
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Render endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "https://card-grader-api-tkae.onrender.com/cron/crawl-cardrush-pokemon")
          BODY=$(echo "$RESP" | head -n -1)
          CODE=$(echo "$RESP" | tail -n 1)
          echo "HTTP $CODE"
          echo "$BODY"
          if [ "$CODE" != "200" ]; then
            echo "::error::cron endpoint returned $CODE"
            exit 1
          fi
