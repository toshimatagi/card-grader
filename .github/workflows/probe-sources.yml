name: probe-sources

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe candidate sources
        run: |
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          for url in \
            "https://yuyu-tei.jp/sell/opc/s/op15" \
            "https://www.cardrush-op.jp/product-group/119" \
            "https://tier-one-onepiece.jp/view/category/op15" \
            "https://www.mercardop.jp/product-group/71" \
            "https://fullahead-onepiece-cardgame.com/view/category/opc-op15" \
            "https://www.tcg-raftel.com/" \
            "https://www.torecard.com/purchase/onepiece/list/" \
            "https://shopmanzokuya.com/products/list?category_id=2636"
          do
            code=$(curl -s -o /dev/null -m 15 -L -A "$UA" -w "%{http_code}" "$url")
            echo "$code  $url"
          done
