name: test

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
      - name: Run golden tests (OpenCV 決定的経路)
        # GEMINI_API_KEY を空にして AI をスキップ（テスト側でも設定済みだが二重に明示）
        env:
          GEMINI_API_KEY: ""
          Gemini_API_Key: ""
        run: pytest backend/tests/ -v
