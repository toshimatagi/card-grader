name: crawl-grade-prices

# グレード別 (Raw / PSA10 / PSA9) 価格を Yahoo Auctions 終了オークションから
# 毎日集計し card_grade_prices テーブルに upsert する。
# 高レアカード優先 (rarity in SAR/UR/SR/SEC/L/SP/AR/MUR/RRR/RR/RAR)。
# 低レアは PSA 提出量が少なくサンプル不足のため対象外。

on:
  schedule:
    # 毎日 JST 05:00 ≒ UTC 20:00
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      brand:
        description: "対象ブランド (pokemon / onepiece / both)"
        required: false
        default: "both"
      limit:
        description: "1ブランドあたり最大カード数"
        required: false
        default: "100"

concurrency:
  group: crawl-grade-prices
  cancel-in-progress: false

jobs:
  pokemon:
    if: ${{ github.event.inputs.brand != 'onepiece' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Fetch grade prices (pokemon)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '100' }}"
          python -m backend.scripts.fetch_grade_prices \
            --brand pokemon --limit "$LIMIT" --delay 5

  onepiece:
    if: ${{ github.event.inputs.brand != 'pokemon' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Fetch grade prices (onepiece)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '100' }}"
          python -m backend.scripts.fetch_grade_prices \
            --brand onepiece --limit "$LIMIT" --delay 5
